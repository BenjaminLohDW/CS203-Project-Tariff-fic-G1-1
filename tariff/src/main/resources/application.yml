spring:
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:local} # Default to 'local' if not set

    # These will be overridden by profile-specific configs
    datasource:
        username: ${DB_USER:pgsql}
        password: ${DB_PASSWORD:cs203g1t1}
        driver-class-name: org.postgresql.Driver
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 10
            minimum-idle: 5

    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        validate-on-migrate: false

server:
    port: 5004

# Default to localhost (will be overridden by profiles)
country:
    baseUrl: ${COUNTRY_MS_BASE:http://localhost:5005}
    bynNamePath: /api/countries/by-name

product:
    baseUrl: ${PRODUCT_MS_BASE:http://localhost:5002}
    lookupPath: /api/v1/hs-code/lookup
