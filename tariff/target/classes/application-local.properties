# H2 in-memory — keep DB alive across connections
spring.datasource.url=jdbc:h2:mem:tariffdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# Flyway creates/updates schema; Hibernate only validates
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=PUBLIC
spring.flyway.schemas=PUBLIC

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Disable Spring SQL initializer (no schema.sql/data.sql)
spring.sql.init.mode=never



# Helpful logs
logging.level.org.flywaydb=INFO

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Product MS configuration
product.base-url=http://localhost:5002
product.lookup-path=/api/v1/hs-code/lookup

country.base-url=http://localhost:5005
country.by-name-path=/api/countries/by-name