# src/test/resources/application-test.yml
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.show_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: public

country:
  base-url: http://localhost:65535
product:
  base-url: http://localhost:65535

logging:
  level:
    org.flywaydb: info
